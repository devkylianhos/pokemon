<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PocketPop — Card tracker</title>
<meta name="description" content="PocketPop card tracker: kaartenbinder met grid, filters, waarde en wishlist.">
<link rel="stylesheet" href="pocketpop.css">
<style>
  .wrap { max-width: 1160px; margin: 0 auto; padding: 26px 30px; display: grid; gap: 18px; }
  .binder-head { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
  .binder-title { font-family: var(--font-display); font-size: var(--display-lg); font-weight: 400; line-height: 1; margin: 0; }
  .summary { display: flex; gap: 22px; align-items: center; padding: 12px 18px; }
  .summary__value { font-family: var(--font-display); font-size: 26px; line-height: 1; }
  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
  .tcard { background: var(--surface-card); border: var(--border-thick); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sticker-sm); overflow: hidden; cursor: pointer;
    transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); }
  .tcard:hover { transform: translate(-2px,-2px) rotate(-0.5deg); box-shadow: var(--shadow-sticker); }
  .tcard--unowned { opacity: 0.75; }
  .tcard__art { aspect-ratio: 1; border-bottom: var(--border-thick); display: flex;
    align-items: center; justify-content: center; position: relative; }
  .tcard__art img { width: 52%; }
  .tcard--unowned .tcard__art img { filter: grayscale(1) contrast(0.6); }
  .tcard__wanted { position: absolute; top: 8px; left: 8px; font-family: var(--font-pixel-label);
    font-size: 8px; letter-spacing: 0.08em; background: var(--pp-ink); color: var(--pp-paper); padding: 3px 6px; border-radius: 4px; }
  .tcard__grade { position: absolute; top: 8px; right: 8px; }
  .tcard__body { padding: 12px; }
  .tcard__name { font-family: var(--font-display); font-size: 20px; line-height: 1; }
  .empty { text-align: center; padding: 40px; font-family: var(--font-pixel-label); font-size: 10px;
    letter-spacing: var(--tracking-label); color: var(--text-muted); }
  .backlink { font-family: var(--font-body); font-size: 13px; font-weight: 700; text-decoration: none;
    color: var(--pp-ink-soft); display: inline-flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;gap:10px;">
    <a class="backlink" href="index.html">← Dashboard</a>
  </div>
  <div class="binder-head">
    <div>
      <div class="kicker" style="margin-bottom:6px;">MIJN BINDER</div>
      <h1 class="binder-title">Base Set &amp; meer</h1>
    </div>
    <div class="card card--sm summary">
      <div>
        <div class="pixel muted" style="font-size:8px;">KAARTEN</div>
        <div class="summary__value"><span id="owned-count">0</span><span style="color:var(--text-muted);font-size:18px;">/<span id="total-count">0</span></span></div>
      </div>
      <div>
        <div class="pixel muted" style="font-size:8px;">WAARDE</div>
        <div class="summary__value" style="color:var(--pp-lime-deep);">€<span id="total-value">0</span></div>
      </div>
      <button class="btn btn--sm">+ KAART</button>
    </div>
  </div>

  <div class="toolbar">
    <label class="field input" style="width:260px;">
      <span class="input__icon">⌕</span>
      <input id="search" type="search" placeholder="Zoek kaart…">
    </label>
    <label class="select" style="width:170px;">
      <select id="set-filter">
        <option>Alle sets</option><option>Base Set</option><option>Jungle</option><option>Fossil</option>
      </select>
      <span class="select__arrow">▼</span>
    </label>
    <div class="tabs tabs--body" id="tabs">
      <button class="tab" data-tab="Alles" aria-selected="true">Alles</button>
      <button class="tab" data-tab="In bezit" aria-selected="false">In bezit</button>
      <button class="tab" data-tab="Wishlist" aria-selected="false">Wishlist</button>
    </div>
    <label class="check">
      <input type="checkbox" id="graded-only">
      <span class="check__box"></span>
      <span class="check__label">Alleen graded</span>
    </label>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">GEEN KAARTEN GEVONDEN…</div>
</div>

<div class="scrim" id="scrim" style="display:none;">
  <div class="dialog" role="dialog" aria-modal="true">
    <div class="dialog__title" id="dlg-title"></div>
    <div class="dialog__body" id="dlg-body"></div>
    <div class="dialog__actions" id="dlg-actions"></div>
  </div>
</div>

<script>
  var CARDS = [
    { id:1, name:"Voltling",  set:"Base Set", num:"025/151", type:"electric", rarity:"Holo Rare",  price:245, owned:true,  grade:"PSA 9" },
    { id:2, name:"Sproutle",  set:"Base Set", num:"001/151", type:"grass",    rarity:"Rare",       price:38,  owned:true,  grade:null },
    { id:3, name:"Wispurr",   set:"Fossil",   num:"092/62",  type:"ghost",    rarity:"Holo Rare",  price:180, owned:false, grade:null },
    { id:4, name:"Bubbly",    set:"Base Set", num:"007/151", type:"water",    rarity:"Common",     price:4,   owned:true,  grade:null },
    { id:5, name:"Cindertail",set:"Jungle",   num:"004/64",  type:"fire",     rarity:"Rare",       price:55,  owned:true,  grade:"PSA 8" },
    { id:6, name:"Snoozle",   set:"Jungle",   num:"143/64",  type:"normal",   rarity:"Holo Rare",  price:120, owned:false, grade:null },
    { id:7, name:"Glacierra", set:"Fossil",   num:"131/62",  type:"ice",      rarity:"Rare",       price:67,  owned:true,  grade:null },
    { id:8, name:"Drakuzz",   set:"Base Set", num:"149/151", type:"dragon",   rarity:"Ultra Rare", price:890, owned:false, grade:null },
  ];
  var RARITY_TONE = { "Common":"badge--outline", "Rare":"badge--teal", "Holo Rare":"badge--amber", "Ultra Rare":"badge--coral" };

  var state = { q:"", set:"Alle sets", tab:"Alles", gradedOnly:false };
  var grid = document.getElementById("grid");
  var empty = document.getElementById("empty");

  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

  function render() {
    var list = CARDS.filter(function(c){
      return (state.tab==="Alles" || (state.tab==="In bezit"&&c.owned) || (state.tab==="Wishlist"&&!c.owned))
        && (state.set==="Alle sets" || c.set===state.set)
        && (!state.gradedOnly || c.grade)
        && (state.q==="" || c.name.toLowerCase().indexOf(state.q.toLowerCase())>=0);
    });
    grid.innerHTML = list.map(function(c){
      return '<div class="tcard'+(c.owned?"":" tcard--unowned")+'" data-id="'+c.id+'">'
        + '<div class="tcard__art" style="background:var(--type-'+c.type+');">'
        + '<img src="assets/blip-white.svg" alt="">'
        + (c.owned?"":'<span class="tcard__wanted">GEZOCHT</span>')
        + (c.grade?'<span class="tcard__grade"><span class="badge">'+esc(c.grade)+'</span></span>':"")
        + '</div>'
        + '<div class="tcard__body">'
        + '<div style="display:flex;justify-content:space-between;align-items:baseline;">'
        + '<span class="tcard__name">'+esc(c.name)+'</span>'
        + '<span class="mono muted" style="font-size:10px;">'+esc(c.num)+'</span></div>'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">'
        + '<span class="badge '+(RARITY_TONE[c.rarity]||"badge--outline")+'">'+esc(c.rarity)+'</span>'
        + '<span class="mono" style="font-size:13px;font-weight:700;">€'+c.price+'</span></div>'
        + '</div></div>';
    }).join("");
    empty.style.display = list.length ? "none" : "block";
  }

  // Samenvatting is vast (alle kaarten in bezit)
  var ownedCards = CARDS.filter(function(c){return c.owned;});
  document.getElementById("owned-count").textContent = ownedCards.length;
  document.getElementById("total-count").textContent = CARDS.length;
  document.getElementById("total-value").textContent = ownedCards.reduce(function(s,c){return s+c.price;},0);

  document.getElementById("search").addEventListener("input", function(e){ state.q=e.target.value; render(); });
  document.getElementById("set-filter").addEventListener("change", function(e){ state.set=e.target.value; render(); });
  document.getElementById("graded-only").addEventListener("change", function(e){ state.gradedOnly=e.target.checked; render(); });
  document.querySelectorAll("#tabs .tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll("#tabs .tab").forEach(function(x){ x.setAttribute("aria-selected","false"); });
      t.setAttribute("aria-selected","true"); state.tab=t.dataset.tab; render();
    });
  });

  // Dialog
  var scrim = document.getElementById("scrim");
  function openCard(c){
    document.getElementById("dlg-title").textContent = c.name.toUpperCase()+" · "+c.num;
    document.getElementById("dlg-body").innerHTML =
      '<div style="display:grid;gap:8px;">'
      + '<div style="display:flex;gap:6px;align-items:center;">'
      + '<span class="chip" data-type="'+c.type+'">'+esc(c.type)+'</span>'
      + '<span class="badge '+(RARITY_TONE[c.rarity]||"badge--outline")+'">'+esc(c.rarity)+'</span>'
      + (c.grade?'<span class="badge">'+esc(c.grade)+'</span>':"")
      + '</div>'
      + '<div style="font-size:14px;">Set: <b>'+esc(c.set)+'</b> · Marktwaarde: <b class="mono">€'+c.price+'</b></div>'
      + '<div style="font-size:13px;color:var(--text-muted);">'+(c.owned?"In je collectie.":"Nog niet in je collectie — staat deze op je wishlist?")+'</div>'
      + '</div>';
    document.getElementById("dlg-actions").innerHTML =
      '<button class="btn btn--sm btn--ghost btn--body" data-close>Sluiten</button>'
      + (c.owned?"":'<button class="btn btn--sm" data-close>+ WISHLIST</button>');
    scrim.style.display = "flex";
  }
  grid.addEventListener("click", function(e){
    var el = e.target.closest(".tcard"); if(!el) return;
    var c = CARDS.find(function(x){return x.id==el.dataset.id;}); if(c) openCard(c);
  });
  scrim.addEventListener("click", function(e){
    if(e.target===scrim || e.target.hasAttribute("data-close")) scrim.style.display="none";
  });

  render();
</script>
</body>
</html>
