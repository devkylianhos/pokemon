<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PocketPop — Dashboard</title>
<meta name="description" content="PocketPop live dashboard: watchlist, restocks, prijsdalingen en koop-links.">
<link rel="stylesheet" href="pocketpop.css">
<style>
  header.top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    padding: 20px 30px 16px; border-bottom: var(--border-mid); }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .brand .wordmark { font-size: 22px; }
  .meta { font-family: var(--font-body); font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .meta b { color: var(--text-body); }
  .livedot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--pp-lime);
    margin-right: 5px; }
  .livedot.err { background: var(--pp-coral); }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .ctrl { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 12px;
    font-weight: 700; padding: 8px 12px; background: var(--surface-card); color: var(--pp-ink-soft);
    border: var(--border-mid); border-radius: var(--radius-md); cursor: pointer; }
  .ctrl:hover { color: var(--pp-ink); }
  .ctrl.on { color: var(--pp-ink); background: var(--pp-amber); box-shadow: var(--shadow-sticker-sm); }

  #banner { display: none; padding: 14px 30px 0; }
  #banner .inner { border: var(--border-mid); border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; }
  #banner.warn .inner { background: rgba(251,191,36,.18); border-color: var(--pp-amber-deep); }
  #banner.err .inner { background: rgba(255,93,115,.15); border-color: var(--pp-coral-deep); color: var(--pp-coral-deep); }

  main { display: grid; grid-template-columns: 1fr 360px; gap: 24px; padding: 24px 30px;
    max-width: 1200px; margin: 0 auto; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  h2.sec { font-family: var(--font-pixel-label); font-size: 10px; letter-spacing: var(--tracking-label);
    text-transform: uppercase; color: var(--text-muted); margin: 0 0 14px; }

  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .toolbar .input { flex: 1 1 200px; min-width: 150px; }
  .toolbar .select { width: 160px; }
  .chip-filter { font-family: var(--font-body); font-size: 12px; font-weight: 700; padding: 8px 14px;
    background: var(--surface-card); color: var(--pp-ink-soft); border: var(--border-mid);
    border-radius: var(--radius-pill); cursor: pointer; }
  .chip-filter.active { background: var(--pp-ink); color: var(--pp-paper); box-shadow: var(--shadow-sticker-sm); }

  .grid { display: grid; gap: 12px; }
  .card.prod { display: grid; grid-template-columns: 16px 1fr auto; gap: 14px; align-items: center;
    padding: 14px 16px; box-shadow: var(--shadow-sticker-sm); }
  .card.prod.hot { border-color: var(--pp-amber-deep); box-shadow: var(--shadow-sticker); }
  .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--pp-ink); }
  .dot.in { background: var(--pp-lime); }
  .dot.listed { background: var(--pp-amber); }
  .dot.out { background: var(--pp-coral); }
  .prod .name { font-family: var(--font-body); font-weight: 700; font-size: 15px; }
  .prod .star { cursor: pointer; margin-left: 6px; color: var(--pp-ink-faint); user-select: none; }
  .prod .star.on { color: var(--pp-amber-deep); }
  .prod .sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .prod .actions { margin-top: 8px; }
  .prod .right { text-align: right; }
  .prod .price { font-family: var(--font-mono); font-size: 18px; font-weight: 700; }
  .prod .price small { display: block; font-size: 10px; color: var(--text-muted); font-weight: 400; }
  .buy { display: inline-block; text-decoration: none; font-family: var(--font-body); font-weight: 700; font-size: 12px;
    padding: 6px 12px; border-radius: var(--radius-md); background: var(--pp-coral); color: #fff;
    border: 2px solid var(--pp-ink); box-shadow: var(--shadow-sticker-sm); }
  .buy.dim { background: var(--surface-well); color: var(--pp-ink-soft); box-shadow: none; }
  .spark { display: block; margin: 0 0 4px auto; }
  .spark polyline { fill: none; stroke-width: 2; }
  .spark.down polyline { stroke: var(--pp-lime-deep); }
  .spark.up polyline { stroke: var(--pp-coral); }
  .spark.flat polyline { stroke: var(--text-muted); }

  /* retailer badge */
  .rt { display: inline-flex; font-family: var(--font-pixel-label); font-size: 8px; letter-spacing: var(--tracking-label);
    text-transform: uppercase; padding: 2px 6px; border: 2px solid var(--pp-ink); border-radius: 4px; color: var(--pp-ink); }
  .rt.bol { background: var(--type-water); }
  .rt.mediamarkt { background: var(--pp-coral); color: #fff; }
  .rt.coolblue { background: var(--pp-amber); }
  .rt.amazon { background: var(--type-electric); }

  /* events */
  .event { display: flex; gap: 10px; align-items: baseline; font-size: 13px; padding: 12px 4px; border-bottom: var(--border-hair); }
  .event:last-child { border-bottom: 0; }
  .event .tag { flex-shrink: 0; font-family: var(--font-pixel-label); font-size: 8px; letter-spacing: var(--tracking-label);
    text-transform: uppercase; padding: 3px 7px; border: 2px solid var(--pp-ink); border-radius: 4px; color: var(--pp-ink); }
  .tag.bol_drop { background: var(--pp-coral); color: #fff; box-shadow: var(--shadow-sticker-sm); }
  .tag.restock { background: var(--pp-lime); }
  .tag.price_drop { background: var(--type-water); }
  .tag.out_of_stock { background: var(--pp-coral); color: #fff; }
  .tag.drop_signal { background: var(--pp-amber); }
  .event .when { margin-left: auto; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .event .buy { padding: 2px 8px; font-size: 11px; margin-left: 4px; box-shadow: none; }
  .empty { color: var(--text-muted); font-family: var(--font-pixel-label); font-size: 10px; letter-spacing: var(--tracking-label);
    text-transform: uppercase; padding: 24px; border: 2px dashed var(--pp-line); border-radius: var(--radius-lg); text-align: center; }
</style>
</head>
<body>
<header class="top">
  <div>
    <a class="brand" href="index.html">
      <span class="blip-badge"><img src="assets/blip-white.svg" alt="" width="20"></span>
      <span class="wordmark">POCKET<b>POP</b></span>
    </a>
    <div class="meta"><span class="livedot" id="livedot"></span><b id="count">0</b> producten ·
      laatste check <b id="lastcheck" data-ago="">-</b> · <span id="source">live via Supabase</span></div>
  </div>
  <div class="controls">
    <button class="ctrl" id="btn-notify" title="Browsermelding bij restock, drop of prijsdaling">🔕 Meldingen uit</button>
    <button class="ctrl" id="btn-sound" title="Geluidssignaal bij nieuwe gebeurtenis">🔇 Geluid uit</button>
    <button class="ctrl" id="btn-push" title="Telefoon-push via ntfy.sh">📱 Telefoon</button>
    <button class="ctrl" id="btn-refresh" title="Nu verversen">↻ Ververs</button>
  </div>
</header>
<div id="banner"><div class="inner" id="banner-text"></div></div>
<main>
  <section>
    <h2 class="sec">Watchlist</h2>
    <div class="toolbar">
      <label class="input"><span class="input__icon">⌕</span><input id="search" type="search" placeholder="Zoek op naam of EAN…"></label>
      <button class="chip-filter active" data-filter="all">Alle</button>
      <button class="chip-filter" data-filter="in">Op voorraad</button>
      <button class="chip-filter" data-filter="listed">Klaargezet</button>
      <button class="chip-filter" data-filter="out">Uitverkocht</button>
      <label class="select" style="width:160px;"><select id="retailer"><option value="all">Alle winkels</option></select><span class="select__arrow">▼</span></label>
      <label class="select" style="width:150px;"><select id="sort">
        <option value="status">Status</option>
        <option value="name">Naam A→Z</option>
        <option value="price_asc">Prijs laag→hoog</option>
        <option value="price_desc">Prijs hoog→laag</option>
      </select><span class="select__arrow">▼</span></label>
    </div>
    <div class="grid" id="products"></div>
  </section>
  <aside>
    <h2 class="sec">Gebeurtenissen</h2>
    <div class="card" style="padding:6px 16px;"><div id="events"></div></div>
  </aside>
</main>
<script>
// VUL DEZE TWEE IN vanuit Supabase: Project Settings > API
const SUPABASE_URL = "https://JOUWPROJECT.supabase.co";
const SUPABASE_ANON_KEY = "PLAK_HIER_JE_ANON_PUBLIC_KEY";

const HEADERS = { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY };
const LABELS = { bol_drop: "BOL DROP", restock: "RESTOCK", price_drop: "PRIJS", out_of_stock: "WEG", drop_signal: "DROP" };
const NOTIFY_TYPES = ["bol_drop", "restock", "price_drop", "drop_signal"];
const BUYABLE_TYPES = ["bol_drop", "restock", "price_drop"];
const REFRESH_MS = 30000;
const REFRESH_HOT_MS = 10000;
const DEMO = SUPABASE_URL.includes("JOUWPROJECT") || SUPABASE_ANON_KEY.startsWith("PLAK_");

function loadHot() {
  try { return new Set(JSON.parse(localStorage.getItem("bt_hot") || "[]")); }
  catch (_) { return new Set(); }
}
const state = {
  products: [], events: [],
  filter: "all", search: "", sort: "status", retailer: "all",
  lastSeenTs: null, connected: true,
  notify: localStorage.getItem("bt_notify") === "1",
  sound: localStorage.getItem("bt_sound") === "1",
  hot: loadHot(),
  pushTopic: localStorage.getItem("bt_push") || "",
  pollTimer: null,
};

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function timeAgo(iso) {
  if (!iso) return "-";
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return s + "s geleden";
  if (s < 3600) return Math.floor(s / 60) + "m geleden";
  if (s < 86400) return Math.floor(s / 3600) + "u geleden";
  return Math.floor(s / 86400) + "d geleden";
}
function euro(v) { return v == null ? "-" : "€" + Number(v).toFixed(2).replace(".", ","); }

const RETAILERS = {
  bol: { label: "bol.com",
    product: id => "https://www.bol.com/nl/nl/p/-/" + encodeURIComponent(id) + "/",
    search: q => "https://www.bol.com/nl/nl/s/?searchtext=" + encodeURIComponent(q) },
  mediamarkt: { label: "MediaMarkt", search: q => "https://www.mediamarkt.nl/nl/search.html?query=" + encodeURIComponent(q) },
  coolblue: { label: "Coolblue", search: q => "https://www.coolblue.nl/zoeken?query=" + encodeURIComponent(q) },
  amazon: { label: "Amazon", search: q => "https://www.amazon.nl/s?k=" + encodeURIComponent(q) },
};
function retailerOf(x) { return x.retailer || "bol"; }
function retailerInfo(x) {
  return RETAILERS[retailerOf(x)] ||
    { label: retailerOf(x), search: q => "https://www.google.com/search?q=" + encodeURIComponent(q) };
}
function link(p) {
  if (p.url) return p.url;
  const r = retailerInfo(p);
  if (p.product_id && r.product) return r.product(p.product_id);
  return r.search(p.ean ?? p.name);
}
function eventLink(e) {
  const p = state.products.find(x => x.ean === e.ean && retailerOf(x) === retailerOf(e))
    || { ean: e.ean, product_id: e.product_id, url: e.url, retailer: e.retailer };
  return link(p);
}
function rtBadge(x) {
  return '<span class="rt ' + esc(retailerOf(x)) + '">' + esc(retailerInfo(x).label) + '</span>';
}
function eventText(e) {
  let txt = e.name;
  if (e.type === "bol_drop") txt += " — bol verkoopt nu, " + euro(e.price);
  if (e.type === "restock") txt += " voor " + euro(e.price);
  if (e.type === "price_drop") txt += " " + euro(e.old_price) + " → " + euro(e.price);
  if (e.type === "drop_signal") txt += " wordt klaargezet";
  if (e.type === "out_of_stock") txt += " is uitverkocht";
  return txt;
}
function setBanner(kind, msg) {
  const el = document.getElementById("banner");
  if (!kind) { el.style.display = "none"; el.className = ""; return; }
  el.className = kind;
  el.style.display = "block";
  document.getElementById("banner-text").innerHTML = msg;
}

function priceHistory() {
  const hist = {};
  const src = state.events.slice().sort((a, b) => (a.ts < b.ts ? -1 : 1));
  for (const e of src) {
    if (e.price == null || (e.type !== "restock" && e.type !== "price_drop")) continue;
    const key = retailerOf(e) + "|" + (e.ean ?? e.name);
    (hist[key] = hist[key] || []).push({ ts: e.ts, price: Number(e.price) });
  }
  return hist;
}
function sparkline(points) {
  if (points.length < 2) return "";
  const w = 84, h = 22, pad = 2;
  const prices = points.map(p => p.price);
  const min = Math.min(...prices), max = Math.max(...prices), span = max - min || 1;
  const coords = points.map((p, i) =>
    (pad + i * (w - 2 * pad) / (points.length - 1)).toFixed(1) + "," +
    (h - pad - (p.price - min) / span * (h - 2 * pad)).toFixed(1)).join(" ");
  const first = prices[0], last = prices[prices.length - 1];
  const trend = last < first ? "down" : (last > first ? "up" : "flat");
  return '<svg class="spark ' + trend + '" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + " " + h +
    '"><title>Prijsverloop: ' + esc(euro(first) + " → " + euro(last)) + '</title><polyline points="' + coords + '"/></svg>';
}

function visibleProducts() {
  const q = state.search.trim().toLowerCase();
  let list = state.products.filter(p => {
    if (state.retailer !== "all" && retailerOf(p) !== state.retailer) return false;
    if (state.filter === "in" && !p.in_stock) return false;
    if (state.filter === "listed" && (p.in_stock || !p.listed)) return false;
    if (state.filter === "out" && (p.in_stock || p.listed)) return false;
    if (q && !String(p.name ?? "").toLowerCase().includes(q)
          && !String(p.ean ?? "").toLowerCase().includes(q)) return false;
    return true;
  });
  const rank = p => p.in_stock ? 0 : (p.listed ? 1 : 2);
  const byName = (a, b) => String(a.name).localeCompare(String(b.name), "nl");
  const sorters = {
    status: (a, b) => rank(a) - rank(b) || byName(a, b),
    name: byName,
    price_asc: (a, b) => (a.price ?? Infinity) - (b.price ?? Infinity) || byName(a, b),
    price_desc: (a, b) => (b.price ?? -Infinity) - (a.price ?? -Infinity) || byName(a, b),
  };
  const sorter = sorters[state.sort] || sorters.status;
  return list.sort((a, b) => (state.hot.has(b.ean) - state.hot.has(a.ean)) || sorter(a, b));
}

function updateRetailerFilter() {
  const sel = document.getElementById("retailer");
  const kinds = [...new Set(state.products.map(retailerOf))].sort();
  const want = kinds.join(",");
  if (sel.dataset.kinds === want) return;
  sel.dataset.kinds = want;
  sel.innerHTML = '<option value="all">Alle winkels</option>' + kinds.map(k =>
    '<option value="' + esc(k) + '">' + esc((RETAILERS[k] || { label: k }).label) + '</option>').join("");
  if (!kinds.includes(state.retailer)) state.retailer = "all";
  sel.value = state.retailer;
}

function render() {
  updateRetailerFilter();
  document.getElementById("count").textContent = state.products.length;
  const checks = state.products.map(p => p.last_check).filter(Boolean).sort();
  const lastEl = document.getElementById("lastcheck");
  lastEl.dataset.ts = checks.length ? checks[checks.length - 1] : "";
  lastEl.textContent = checks.length ? timeAgo(checks[checks.length - 1]) : "nog geen";

  const hist = priceHistory();
  const list = visibleProducts();
  const grid = document.getElementById("products");
  const frag = document.createDocumentFragment();
  if (!list.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = state.products.length ? "Geen producten gevonden voor dit filter." : "Nog geen data. Start de tracker op de server.";
    frag.appendChild(empty);
  }
  for (const p of list) {
    const cls = p.in_stock ? "in" : (p.listed ? "listed" : "out");
    const status = p.in_stock ? "op voorraad" : (p.listed ? "pagina klaargezet" : "uitverkocht");
    const hkey = retailerOf(p) + "|";
    const points = (hist[hkey + p.ean] || hist[hkey + p.name] || []).slice(-12);
    if (p.price != null && p.last_check &&
        (!points.length || points[points.length - 1].price !== Number(p.price))) {
      points.push({ ts: p.last_check, price: Number(p.price) });
    }
    const isHot = state.hot.has(p.ean);
    const shop = retailerInfo(p).label;
    const buy = p.in_stock
      ? '<a class="buy" href="' + esc(link(p)) + '" target="_blank" rel="noopener">Koop bij ' + esc(shop) + ' &rarr;</a>'
      : '<a class="buy dim" href="' + esc(link(p)) + '" target="_blank" rel="noopener">Bekijk bij ' + esc(shop) + ' &rarr;</a>';
    const el = document.createElement("div");
    el.className = "card prod" + (isHot ? " hot" : "");
    el.innerHTML =
      '<div class="dot ' + cls + '"></div>' +
      '<div><div class="name">' + esc(p.name) +
        '<span class="star' + (isHot ? " on" : "") + '" data-hot="' + esc(p.ean) +
        '" title="Markeer als hot: vaker checken en luider alarmeren">★</span></div>' +
      '<div class="sub">' + rtBadge(p) + '<span class="mono">EAN ' + esc(p.ean) + '</span> · ' + status + '</div>' +
      '<div class="actions">' + buy + '</div></div>' +
      '<div class="right">' + sparkline(points) +
      '<div class="price">' + euro(p.price) +
      '<small data-ago data-ts="' + esc(p.last_check ?? "") + '">' + timeAgo(p.last_check) + '</small></div></div>';
    frag.appendChild(el);
  }
  grid.replaceChildren(frag);

  const feed = document.getElementById("events");
  const efrag = document.createDocumentFragment();
  const evList = state.events.filter(e => state.retailer === "all" || retailerOf(e) === state.retailer);
  if (!evList.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "Nog geen gebeurtenissen.";
    efrag.appendChild(empty);
  }
  for (const e of evList) {
    const el = document.createElement("div");
    el.className = "event";
    const buy = BUYABLE_TYPES.includes(e.type)
      ? '<a class="buy" href="' + esc(eventLink(e)) + '" target="_blank" rel="noopener">Koop &rarr;</a>' : "";
    el.innerHTML = '<span class="tag ' + esc(e.type) + '">' + esc(LABELS[e.type] || e.type) + '</span>' +
      '<span>' + rtBadge(e) + ' ' + esc(eventText(e)) + buy + '</span>' +
      '<span class="when" data-ago data-ts="' + esc(e.ts ?? "") + '">' + timeAgo(e.ts) + '</span>';
    efrag.appendChild(el);
  }
  feed.replaceChildren(efrag);
}

setInterval(() => {
  document.querySelectorAll("[data-ago]").forEach(el => { if (el.dataset.ts) el.textContent = timeAgo(el.dataset.ts); });
}, 10000);

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .4);
    o.start(); o.stop(ctx.currentTime + .4);
  } catch (_) {}
}
function pushPhone(e) {
  if (!state.pushTopic) return;
  const hot = state.hot.has(e.ean);
  const headers = {
    Title: "PocketPop — " + (LABELS[e.type] || e.type) + " bij " + retailerInfo(e).label,
    Priority: (hot || e.type === "bol_drop") ? "urgent" : "high",
    Tags: e.type === "restock" ? "package" : (e.type === "price_drop" ? "chart_with_downwards_trend" : "eyes"),
  };
  if (BUYABLE_TYPES.includes(e.type)) headers.Actions = "view, Koop nu, " + eventLink(e);
  fetch("https://ntfy.sh/" + encodeURIComponent(state.pushTopic), { method: "POST", headers, body: eventText(e) }).catch(() => {});
}
function maybeNotify(events) {
  if (state.lastSeenTs === null) { state.lastSeenTs = events.length ? events[0].ts : ""; return; }
  const fresh = events.filter(e => e.ts && e.ts > state.lastSeenTs && NOTIFY_TYPES.includes(e.type));
  if (events.length && events[0].ts > state.lastSeenTs) state.lastSeenTs = events[0].ts;
  if (!fresh.length) return;
  fresh.sort((a, b) => (state.hot.has(b.ean) - state.hot.has(a.ean)));
  const anyHot = fresh.some(e => state.hot.has(e.ean));
  if (state.sound) { beep(); if (anyHot) setTimeout(beep, 250); }
  if (state.notify && "Notification" in window && Notification.permission === "granted") {
    for (const e of fresh.slice(0, 3)) {
      const n = new Notification((state.hot.has(e.ean) ? "🔥 " : "") +
        "PocketPop — " + (LABELS[e.type] || e.type) + " bij " + retailerInfo(e).label, { body: eventText(e) });
      if (BUYABLE_TYPES.includes(e.type)) n.onclick = () => window.open(eventLink(e), "_blank");
    }
  }
  for (const e of fresh) pushPhone(e);
}
function updateButtons() {
  const nb = document.getElementById("btn-notify"), sb = document.getElementById("btn-sound"), pb = document.getElementById("btn-push");
  nb.classList.toggle("on", state.notify);
  nb.textContent = state.notify ? "🔔 Meldingen aan" : "🔕 Meldingen uit";
  sb.classList.toggle("on", state.sound);
  sb.textContent = state.sound ? "🔊 Geluid aan" : "🔇 Geluid uit";
  pb.classList.toggle("on", !!state.pushTopic);
  pb.textContent = state.pushTopic ? "📱 Telefoon aan" : "📱 Telefoon";
}
document.getElementById("btn-notify").addEventListener("click", async () => {
  if (!state.notify) {
    if (!("Notification" in window)) { setBanner("err", "Deze browser ondersteunt geen meldingen."); return; }
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { setBanner("err", "Meldingen zijn geweigerd in de browser. Sta ze toe via de site-instellingen."); return; }
    state.notify = true;
  } else state.notify = false;
  localStorage.setItem("bt_notify", state.notify ? "1" : "0");
  updateButtons();
});
document.getElementById("btn-sound").addEventListener("click", () => {
  state.sound = !state.sound;
  localStorage.setItem("bt_sound", state.sound ? "1" : "0");
  if (state.sound) beep();
  updateButtons();
});
document.getElementById("btn-push").addEventListener("click", () => {
  if (state.pushTopic) {
    if (!confirm("Telefoon-push uitzetten voor topic \"" + state.pushTopic + "\"?")) return;
    state.pushTopic = "";
  } else {
    const topic = prompt(
      "Telefoon-push via ntfy.sh (gratis, geen account):\n" +
      "1. Installeer de 'ntfy' app op je telefoon\n" +
      "2. Abonneer daar op een zelfgekozen topicnaam\n" +
      "3. Vul diezelfde naam hier in\n\n" +
      "Kies iets uniek en geheim (iedereen die de naam kent, ontvangt je meldingen):",
      "pocketpop-" + Math.random().toString(36).slice(2, 8));
    if (!topic) return;
    state.pushTopic = topic.trim();
    fetch("https://ntfy.sh/" + encodeURIComponent(state.pushTopic), {
      method: "POST", headers: { Title: "PocketPop", Tags: "white_check_mark" },
      body: "Telefoon-push staat aan. Je krijgt nu meldingen bij restocks en prijsdalingen.",
    }).catch(() => {});
  }
  localStorage.setItem("bt_push", state.pushTopic);
  updateButtons();
});

document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; render(); });
document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; render(); });
document.getElementById("retailer").addEventListener("change", e => { state.retailer = e.target.value; render(); });
document.querySelectorAll(".chip-filter").forEach(chip => chip.addEventListener("click", () => {
  document.querySelectorAll(".chip-filter").forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  state.filter = chip.dataset.filter;
  render();
}));
document.getElementById("btn-refresh").addEventListener("click", refresh);

document.getElementById("products").addEventListener("click", e => {
  const star = e.target.closest(".star");
  if (!star) return;
  const ean = star.dataset.hot;
  if (state.hot.has(ean)) state.hot.delete(ean); else state.hot.add(ean);
  localStorage.setItem("bt_hot", JSON.stringify([...state.hot]));
  render();
  schedulePoll();
});

function schedulePoll() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  const ms = state.hot.size ? REFRESH_HOT_MS : REFRESH_MS;
  state.pollTimer = setInterval(refresh, ms);
}

function setConnected(ok, msg) {
  state.connected = ok;
  document.getElementById("livedot").classList.toggle("err", !ok);
  if (ok) { if (!DEMO) setBanner(null); }
  else setBanner("err", msg);
}

async function refresh() {
  if (DEMO) { loadDemo(); return; }
  try {
    const [sr, er] = await Promise.all([
      fetch(SUPABASE_URL + "/rest/v1/tracker_state?select=*&order=name", { headers: HEADERS }),
      fetch(SUPABASE_URL + "/rest/v1/tracker_events?select=*&order=ts.desc&limit=100", { headers: HEADERS }),
    ]);
    if (!sr.ok) throw new Error("tracker_state HTTP " + sr.status);
    if (!er.ok) throw new Error("tracker_events HTTP " + er.status);
    const products = await sr.json();
    const events = await er.json();
    if (!Array.isArray(products) || !Array.isArray(events)) throw new Error("onverwacht antwoord van Supabase");
    state.products = products;
    state.events = events;
    setConnected(true);
    render();
    maybeNotify(events);
  } catch (err) {
    setConnected(false, "Kan geen verbinding maken met Supabase (" + esc(err.message) + "). Nieuwe poging over " + REFRESH_MS / 1000 + "s.");
  }
}
