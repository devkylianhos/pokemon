<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PocketPop — Mobiele app</title>
<meta name="description" content="PocketPop mobiele dex-app: browsen, zoeken, filteren en vangen.">
<link rel="stylesheet" href="pocketpop.css">
<style>
  body { display: flex; justify-content: center; background: var(--pp-ink); }
  .phone { width: 390px; min-height: 100vh; background: var(--surface-page);
    padding: 18px 16px 24px; display: grid; gap: 14px; align-content: start; }
  .app-head { display: flex; align-items: center; justify-content: space-between; }
  .app-logo { display: flex; align-items: center; gap: 8px; }
  .app-logo .wordmark { font-size: 24px; }
  .dexrow { display: flex; align-items: center; gap: 12px; background: var(--surface-card);
    border: var(--border-thick); border-radius: var(--radius-lg); box-shadow: var(--shadow-sticker-sm);
    padding: 12px; cursor: pointer; }
  .dexrow__art { width: 56px; height: 56px; flex: 0 0 auto; border: var(--border-mid);
    border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
  .dexrow__art img { width: 40px; }
  .dexrow__name { font-family: var(--font-display); font-size: 22px; line-height: 1; }
  .dexrow__meta { display: grid; gap: 4px; justify-items: end; }
  .empty { text-align: center; padding: 30px; font-family: var(--font-pixel-label); font-size: 10px;
    letter-spacing: var(--tracking-label); color: var(--text-muted); }
  .detail-hero { border: var(--border-thick); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sticker); padding: 20px; display: flex; justify-content: center; }
  .detail-hero img { width: 140px; }
  .toast-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200; }
</style>
</head>
<body>
<div class="phone" id="app"></div>
<div class="toast-wrap" id="toast-wrap" style="display:none;"></div>

<script>
  var DEX = [
    { n:1,  name:"Sproutle",  types:["grass","poison"], hp:45, def:49, spd:45, caught:true,  c:"grass" },
    { n:4,  name:"Cindertail",types:["fire"],           hp:39, def:43, spd:65, caught:true,  c:"fire" },
    { n:7,  name:"Bubbly",    types:["water"],          hp:44, def:65, spd:43, caught:false, c:"water" },
    { n:25, name:"Voltling",  types:["electric"],       hp:35, def:40, spd:90, caught:true,  shiny:true, c:"electric" },
    { n:92, name:"Wispurr",   types:["ghost","poison"], hp:30, def:35, spd:80, caught:false, c:"ghost" },
    { n:143,name:"Snoozle",   types:["normal"],         hp:160,def:65, spd:30, caught:true,  c:"normal" },
  ];
  var state = { q:"", tab:"Alles", open:null, extra:{} };
  var app = document.getElementById("app");

  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function pad3(n){ return String(n).padStart(3,"0"); }
  function isCaught(m){ return state.extra[m.n] != null ? state.extra[m.n] : m.caught; }

  function chips(types, size){ return types.map(function(t){ return '<span class="chip'+(size==="sm"?" chip--sm":"")+'" data-type="'+t+'">'+esc(t)+'</span>'; }).join(""); }

  function renderList() {
    var caughtCount = DEX.filter(isCaught).length;
    var list = DEX.filter(function(m){
      return (state.tab==="Alles" || (state.tab==="Gevangen"&&isCaught(m)) || (state.tab==="Shiny"&&m.shiny))
        && (state.q==="" || m.name.toLowerCase().indexOf(state.q.toLowerCase())>=0 || String(m.n).indexOf(state.q)>=0);
    });
    var rows = list.map(function(m){
      var caught = isCaught(m);
      return '<div class="dexrow" data-n="'+m.n+'">'
        + '<div class="dexrow__art" style="background:var(--type-'+m.c+');"><img src="assets/blip-white.svg" alt=""></div>'
        + '<div style="flex:1;min-width:0;">'
        + '<div style="display:flex;align-items:baseline;gap:8px;">'
        + '<span class="mono muted" style="font-size:10px;">#'+pad3(m.n)+'</span>'
        + '<span class="dexrow__name">'+esc(m.name)+'</span></div>'
        + '<div style="display:flex;gap:4px;margin-top:5px;">'+chips(m.types,"sm")+'</div></div>'
        + '<div class="dexrow__meta">'
        + (m.shiny?'<span class="badge badge--amber">SHINY</span>':"")
        + (caught?'<span class="badge badge--lime">✓</span>':'<span class="badge badge--outline">—</span>')
        + '</div></div>';
    }).join("");

    app.innerHTML =
      '<div class="app-head">'
      + '<div class="app-logo"><span class="blip-badge"><img src="assets/blip-white.svg" alt="" width="20"></span>'
      + '<span class="wordmark">POCKET<b>POP</b></span></div>'
      + '<button class="iconbtn iconbtn--sm" title="Profiel">☺</button></div>'
      + '<div><div class="progress__head"><span class="progress__label">Kanto dex</span>'
      + '<span class="progress__value">'+caughtCount+'/'+DEX.length+'</span></div>'
      + '<div class="progress__track"><div class="progress__fill" style="width:'+(caughtCount/DEX.length*100)+'%;background:var(--pp-lime);"></div></div></div>'
      + '<label class="field input"><span class="input__icon">⌕</span>'
      + '<input id="search" type="search" placeholder="Zoek op naam of nummer…" value="'+esc(state.q)+'"></label>'
      + '<div class="tabs" id="tabs">'
      + ['Alles','Gevangen','Shiny'].map(function(t){ return '<button class="tab" data-tab="'+t+'" aria-selected="'+(state.tab===t)+'">'+t+'</button>'; }).join("")
      + '</div>'
      + '<div style="display:grid;gap:10px;">'+(rows || '<div class="empty">NIETS GEVONDEN…</div>')+'</div>';

    var s = document.getElementById("search");
    s.addEventListener("input", function(e){ state.q=e.target.value; renderList(); restoreFocus(); });
    window._focusSearch = document.activeElement === s;
    document.querySelectorAll("#tabs .tab").forEach(function(t){
      t.addEventListener("click", function(){ state.tab=t.dataset.tab; renderList(); });
    });
    app.querySelectorAll(".dexrow").forEach(function(row){
      row.addEventListener("click", function(){ state.open = DEX.find(function(m){return m.n==row.dataset.n;}); renderDetail(); });
    });
  }

  function restoreFocus(){
    if (window._focusSearch) { var s=document.getElementById("search"); if(s){ s.focus(); s.setSelectionRange(s.value.length,s.value.length); } }
  }

  function renderDetail() {
    var m = state.open; var caught = isCaught(m);
    function statbar(label,val){ var pct=Math.max(0,Math.min(100,val/160*100));
      return '<div class="statbar"><span class="statbar__label">'+label+'</span>'
        + '<div class="statbar__track"><div class="statbar__fill" style="width:'+pct+'%;background:var(--pp-'+(label==="HP"?"coral":label==="DEF"?"teal":"lime")+');"></div></div>'
        + '<span class="statbar__value">'+val+'</span></div>'; }

    app.innerHTML =
      '<div style="display:grid;gap:14px;">'
      + '<div style="display:flex;align-items:center;gap:10px;">'
      + '<button class="iconbtn iconbtn--sm" id="back" title="Terug">←</button>'
      + '<span class="pixel muted" style="font-size:10px;">DEX ENTRY</span></div>'
      + '<div class="detail-hero" style="background:var(--type-'+m.c+');"><img src="assets/blip-white.svg" alt="'+esc(m.name)+'"></div>'
      + '<div><div style="display:flex;align-items:baseline;gap:10px;">'
      + '<span class="mono muted" style="font-size:12px;">#'+pad3(m.n)+'</span>'
      + '<span class="display" style="font-size:var(--display-md);">'+esc(m.name)+'</span></div>'
      + '<div style="display:flex;gap:5px;margin-top:8px;">'+chips(m.types)+'</div></div>'
      + '<div class="card card--sm" style="padding:16px;display:grid;gap:8px;">'
      + statbar("HP",m.hp)+statbar("DEF",m.def)+statbar("SPD",m.spd)+'</div>'
      + '<button class="btn btn--lg btn--full'+(caught?" btn--neutral":"")+'" id="catch">'+(caught?"IN JE DEX ✓":"VANGEN!")+'</button>'
      + '</div>';

    document.getElementById("back").addEventListener("click", function(){ state.open=null; renderList(); });
    document.getElementById("catch").addEventListener("click", function(){
      if (isCaught(m)) return;
      state.extra[m.n] = true; showToast(m.name+" gevangen!"); renderDetail();
    });
  }

  var toastTimer;
  function showToast(msg){
    var w = document.getElementById("toast-wrap");
    w.innerHTML = '<div class="toast toast--success">'+esc(msg)+'</div>';
    w.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ w.style.display="none"; }, 2200);
  }

  renderList();
</script>
</body>
</html>
