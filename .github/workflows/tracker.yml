name: boltracker

on:
  schedule:
    # Elke 5 minuten (GitHub-minimum; kan onder drukte iets later draaien).
    # Genoeg om drops te zíén. Voor de scherpste Bol-Drop-voorsprong (venster van
    # 5–10 min) draai je de tracker beter elke ~60s op een altijd-aan host:
    #   while true; do python tracker/tracker.py; sleep 60; done
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # laat je 'm ook handmatig starten via de Actions-tab

# Voorkomt dat twee runs elkaar overlappen als een run uitloopt.
concurrency:
  group: boltracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependencies installeren
        run: pip install -r tracker/requirements.txt

      - name: Tracker draaien
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Officiële bol Retailer API (aanbevolen; zie README voor het aanvragen)
          BOL_CLIENT_ID: ${{ secrets.BOL_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.BOL_CLIENT_SECRET }}
          # Optioneel: Discord-webhook voor alerts
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python tracker/tracker.py
